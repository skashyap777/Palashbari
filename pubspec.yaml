flutter_native_splash:
  # Premium Figma Teal
  color: "#00bba7"
  image: assets/Logo_v2.png
  
  android_gravity: center
  ios_content_mode: center
  
  android_12:
    color: "#00bba7"
    image: assets/Logo_v2.png
    # Match background to hide the mask
    icon_background_color: "#00bba7"
  
  fullscreen: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/Icon/android/ic_launcher-web.png"
  adaptive_icon_background: "#00bba7"
  adaptive_icon_foreground: "assets/Icon/android/mipmap-xxxhdpi/ic_launcher_foreground.png"

